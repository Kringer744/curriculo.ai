<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CurrículoAI — Motion Creative</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09090a;--acc:#d4b896;--fb:'DM Sans',sans-serif}
body{
  background:#080809;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;padding:32px 20px 48px;
  font-family:var(--fb);color:#fff;gap:20px;
}

/* ── HEADER ── */
.header{display:flex;flex-direction:column;align-items:center;gap:4px}
.logo{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3)}
.logo em{font-style:italic;font-family:'Cormorant Garamond',serif;color:var(--acc);letter-spacing:1px}
.tagline{font-size:10px;color:rgba(255,255,255,.18);letter-spacing:.5px}

/* ── FORMAT TOGGLE ── */
.fmt-toggle{
  display:flex;gap:0;
  background:#111113;border:1px solid rgba(255,255,255,.08);
  border-radius:9px;padding:4px;
}
.fmt-btn{
  padding:7px 20px;border-radius:6px;border:none;
  font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;
  cursor:pointer;transition:all .2s;color:rgba(255,255,255,.3);background:transparent;
  display:flex;align-items:center;gap:6px;
}
.fmt-btn.active{background:var(--acc);color:#09090a;}
.fmt-btn:not(.active):hover{color:rgba(255,255,255,.6)}

.fmt-icon{opacity:.7}
.fmt-btn.active .fmt-icon{opacity:1}

/* ── CANVAS WRAP ── */
.canvas-outer{
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.canvas-wrap{
  position:relative;border-radius:14px;overflow:hidden;
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 40px 100px rgba(0,0,0,.85);
  transition:all .35s cubic-bezier(.4,0,.2,1);
}
/* Feed 1:1 */
.canvas-wrap.feed   canvas{display:block;width:400px;height:400px}
/* Stories 9:16 */
.canvas-wrap.stories canvas{display:block;width:270px;height:480px}

/* ── CONTROLS ── */
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 20px;border-radius:7px;
  font-family:var(--fb);font-size:10px;font-weight:500;letter-spacing:.7px;text-transform:uppercase;
  cursor:pointer;border:none;transition:opacity .15s,transform .1s;white-space:nowrap;
}
.btn:hover{opacity:.82;transform:translateY(-1px)}
.btn:active{transform:translateY(0);opacity:1}
.btn-rec {background:#c0392b;color:#fff}
.btn-stop{background:#1e1e21;color:#fff;border:1px solid rgba(255,255,255,.1)}
.btn-reset{background:#1e1e21;color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.08)}
.btn:disabled{opacity:.3;pointer-events:none}

/* ── STATUS ── */
.status{
  font-size:10px;color:rgba(255,255,255,.28);letter-spacing:.3px;
  display:flex;align-items:center;gap:6px;
}
.rec-dot{
  width:6px;height:6px;border-radius:50%;background:#c0392b;
  animation:blink .9s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── INFO ── */
.info{
  font-size:10px;color:rgba(255,255,255,.18);text-align:center;
  line-height:1.8;letter-spacing:.2px;max-width:340px;
}
.info strong{color:rgba(212,184,150,.45);font-weight:400}

/* ── SPEC BADGES ── */
.specs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.spec{
  padding:4px 10px;border-radius:20px;
  font-size:9px;font-weight:400;letter-spacing:.6px;text-transform:uppercase;
  border:1px solid rgba(255,255,255,.07);color:rgba(255,255,255,.2);
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Currículo<em>AI</em></div>
  <div class="tagline">Motion Creative — Meta Ads</div>
</div>

<!-- FORMAT TOGGLE -->
<div class="fmt-toggle">
  <button class="fmt-btn active" id="btnFeed" onclick="setFormat('feed')">
    <svg class="fmt-icon" width="12" height="12" viewBox="0 0 12 12"><rect width="12" height="12" rx="2" fill="currentColor"/></svg>
    Feed 1:1
  </button>
  <button class="fmt-btn" id="btnStories" onclick="setFormat('stories')">
    <svg class="fmt-icon" width="8" height="12" viewBox="0 0 8 12"><rect width="8" height="12" rx="2" fill="currentColor"/></svg>
    Stories 9:16
  </button>
</div>

<!-- CANVAS -->
<div class="canvas-outer">
  <div class="canvas-wrap feed" id="canvasWrap">
    <canvas id="c"></canvas>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button class="btn btn-rec" id="btnRec" onclick="startRecording()">
    <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="currentColor"/></svg>
    Gravar Vídeo
  </button>
  <button class="btn btn-stop" id="btnStop" onclick="stopRecording()" disabled>
    <svg width="8" height="8" viewBox="0 0 8 8"><rect width="8" height="8" rx="1.5" fill="currentColor"/></svg>
    Parar e Baixar
  </button>
  <button class="btn btn-reset" onclick="resetAnim()">
    <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M2 8a6 6 0 1 1 1.5 3.9l1.1-1.1A4.5 4.5 0 1 0 3.5 8H5l-2.5 2.5L0 8h2z"/></svg>
    Reiniciar
  </button>
</div>

<div class="status" id="status">Animação em loop · Clique em Gravar para capturar</div>

<div class="specs" id="specs">
  <div class="spec" id="specFmt">Feed · 1080×1080 px</div>
  <div class="spec">60 fps</div>
  <div class="spec">WebM · ~8s loop</div>
  <div class="spec">Meta Ads</div>
</div>

<div class="info">
  Grave por pelo menos <strong>1 loop completo (~8s)</strong>.<br>
  Download em <strong>WebM</strong> · compatível com Premiere, After Effects e Meta Ads.
</div>

<script>
/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
const FONT_D = '"Cormorant Garamond", Georgia, serif';
const FONT_U = '"DM Sans", sans-serif';
const C_BG   = '#09090a';
const C_ACC  = '#d4b896';
const C_W    = '#ffffff';
const C_T2   = 'rgba(255,255,255,0.42)';
const C_T3   = 'rgba(255,255,255,0.20)';
const FPS    = 60;
const TOTAL  = 510; // ~8.5s loop

/* ═══════════════════════════════════════════
   CANVAS & FORMAT STATE
═══════════════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let FORMAT   = 'feed';   // 'feed' | 'stories'
let W, H;

function applyFormat(fmt){
  FORMAT = fmt;
  if(fmt === 'feed'){
    canvas.width  = 1080;
    canvas.height = 1080;
  } else {
    canvas.width  = 1080;
    canvas.height = 1920;
  }
  W = canvas.width;
  H = canvas.height;
  initParticles();

  // UI: toggle classes
  document.getElementById('canvasWrap').className = `canvas-wrap ${fmt}`;
  document.getElementById('btnFeed').className    = `fmt-btn${fmt==='feed'?' active':''}`;
  document.getElementById('btnStories').className = `fmt-btn${fmt==='stories'?' active':''}`;
  document.getElementById('specFmt').textContent  =
    fmt === 'feed' ? 'Feed · 1080×1080 px' : 'Stories · 1080×1920 px';
}

function setFormat(fmt){
  if(FORMAT === fmt) return;
  if(recorder && recorder.state !== 'inactive') return; // can't switch while recording
  frame = 0;
  applyFormat(fmt);
}

applyFormat('feed');

/* ═══════════════════════════════════════════
   ANIMATION STATE
═══════════════════════════════════════════ */
let frame     = 0;
let particles = [];
let raf       = null;
let recorder  = null;
let chunks    = [];

/* ═══════════════════════════════════════════
   EASING
═══════════════════════════════════════════ */
const ease = {
  out3:  t => 1 - Math.pow(1-t,3),
  out5:  t => 1 - Math.pow(1-t,5),
  in3:   t => t*t*t,
  spring:t => {
    if(t===0) return 0; if(t===1) return 1;
    const c4 = (2*Math.PI)/3;
    return Math.pow(2,-10*t)*Math.sin((t*10-.75)*c4)+1;
  }
};
const clamp    = (v,a,b) => Math.max(a,Math.min(b,v));
const progress = (f,s,e) => clamp((f-s)/(e-s),0,1);
const lerp     = (a,b,t) => a+(b-a)*t;

/* ═══════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════ */
function initParticles(){
  particles = Array.from({length:46},()=>({
    x: Math.random()*W,
    y: Math.random()*H,
    r: Math.random()*1.4+.3,
    vx:(Math.random()-.5)*.3,
    vy:(Math.random()-.5)*.3,
    o: Math.random()*.22+.04,
    fl:Math.random()*Math.PI*2,
    fs:Math.random()*.035+.008,
  }));
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* ═══════════════════════════════════════════
   DRAW — shared elements (W/H relative)
═══════════════════════════════════════════ */
function drawBg(bgAlpha, f){
  ctx.globalAlpha = 1;
  ctx.fillStyle = C_BG;
  ctx.fillRect(0,0,W,H);
  // ambient glow
  const ga = bgAlpha * .55 * (.7+.3*Math.sin(f*.018));
  const grd = ctx.createRadialGradient(W*.12,H*.5,0,W*.12,H*.5,W*.7);
  grd.addColorStop(0,`rgba(212,184,150,${ga})`);
  grd.addColorStop(1,'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);
}

function drawParticles(bgAlpha){
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    p.fl+=p.fs;
    ctx.globalAlpha = p.o*(.5+.5*Math.sin(p.fl))*bgAlpha;
    ctx.fillStyle = C_ACC;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawLogo(f, lx, ly){
  const p = ease.spring(progress(f,15,75));
  if(p<=0) return;
  ctx.save();
  ctx.globalAlpha = clamp(p*1.4,0,1);
  ctx.translate(0, lerp(-W*.015,0,p));
  const fs = W*.024;
  ctx.font = `300 ${fs}px/1 ${FONT_U}`;
  ctx.fillStyle = C_T2;
  ctx.fillText('Currículo', lx, ly);
  const tw = ctx.measureText('Currículo').width;
  ctx.font = `italic 300 ${fs}px/1 ${FONT_D}`;
  ctx.fillStyle = C_ACC;
  ctx.fillText('AI', lx+tw+W*.002, ly);
  ctx.restore(); ctx.globalAlpha=1;
}

function drawBadge(f, bx, by){
  const p = ease.spring(progress(f,35,95));
  if(p<=0) return;
  ctx.save();
  ctx.globalAlpha = clamp(p*1.5,0,1);
  ctx.translate(0, lerp(-W*.02,0,p));
  const bw=W*.24, bh=W*.04, br=bw/2, dotR=W*.005;
  roundRect(bx,by,bw,bh,br);
  ctx.fillStyle='rgba(212,184,150,0.07)'; ctx.fill();
  roundRect(bx,by,bw,bh,br);
  ctx.strokeStyle='rgba(212,184,150,0.22)'; ctx.lineWidth=1.2; ctx.stroke();
  ctx.fillStyle=C_ACC;
  ctx.beginPath(); ctx.arc(bx+bw*.12,by+bh/2,dotR,0,Math.PI*2); ctx.fill();
  ctx.font=`400 ${W*.016}px/1 ${FONT_U}`;
  ctx.fillStyle=C_T2;
  ctx.letterSpacing=`${W*.003}px`;
  ctx.fillText('POWERED BY IA', bx+bw*.21, by+bh*.68);
  ctx.letterSpacing='0px';
  ctx.restore(); ctx.globalAlpha=1;
}

function drawHeadline(f, lx, startY, lineH, fs){
  const lines=[
    {t:'O mercado',   s:85,  e:145, italic:false},
    {t:'não espera',  s:115, e:180, italic:true},
    {t:'por você.',   s:150, e:210, italic:false},
  ];
  lines.forEach((ln,i)=>{
    const p=ease.out5(progress(f,ln.s,ln.e));
    if(p<=0)return;
    ctx.save();
    ctx.globalAlpha=p;
    ctx.translate(0,lerp(W*.032,0,p));
    ctx.font = ln.italic
      ? `italic 300 ${fs}px/1 ${FONT_D}`
      : `300 ${fs}px/1 ${FONT_D}`;
    ctx.fillStyle = ln.italic ? C_ACC : C_W;
    ctx.fillText(ln.t, lx, startY + i*lineH);
    ctx.restore(); ctx.globalAlpha=1;
  });
}

function drawSubtext(f, lx, y, fs){
  const p=ease.out3(progress(f,210,270));
  if(p<=0)return;
  ctx.save();
  ctx.globalAlpha=p*.65;
  ctx.translate(0,lerp(W*.015,0,p));
  ctx.font=`300 ${fs}px/1 ${FONT_U}`;
  ctx.fillStyle=C_T2;
  ctx.fillText('Currículo profissional com IA em menos de 3 minutos.',lx,y);
  ctx.restore(); ctx.globalAlpha=1;
}

function drawDivider(f, lx, y){
  const p=ease.out3(progress(f,215,280));
  if(p<=0)return;
  ctx.globalAlpha=p*.15;
  ctx.fillStyle=C_W;
  ctx.fillRect(lx, y, W*.84*p, 1.5);
  ctx.globalAlpha=1;
}

function drawStats(f, lx, y, valFs, labFs){
  const s1=ease.spring(progress(f,260,315));
  const s2=ease.spring(progress(f,280,335));
  [{val:'+12k',  label:'currículos gerados', p:s1, x:lx},
   {val:'3 min', label:'tempo médio',         p:s2, x:lx+W*.32}
  ].forEach(s=>{
    if(s.p<=0)return;
    ctx.save();
    ctx.globalAlpha=clamp(s.p*1.5,0,1);
    ctx.translate(0,lerp(W*.022,0,s.p));
    ctx.font=`300 ${valFs}px/1 ${FONT_D}`;
    ctx.fillStyle=C_ACC;
    ctx.fillText(s.val,s.x,y);
    ctx.font=`300 ${labFs}px/1 ${FONT_U}`;
    ctx.fillStyle=C_T3;
    ctx.fillText(s.label,s.x,y+labFs*1.5);
    ctx.restore(); ctx.globalAlpha=1;
  });
}

function drawCTA(f, bx, by){
  const p=ease.spring(progress(f,330,390));
  if(p<=0)return;
  const bw=W*.32, bh=W*.07, br=W*.012;
  ctx.save(); ctx.globalAlpha=p;
  const pulse=.5+.5*Math.sin(f*.08);
  const bg2=ctx.createRadialGradient(bx+bw/2,by+bh/2,0,bx+bw/2,by+bh/2,W*.2);
  bg2.addColorStop(0,`rgba(212,184,150,${.18*pulse})`);
  bg2.addColorStop(1,'transparent');
  ctx.fillStyle=bg2; ctx.fillRect(bx-W*.06,by-W*.06,bw+W*.12,bh+W*.12);
  roundRect(bx,by,bw,bh,br);
  ctx.fillStyle=C_ACC; ctx.fill();
  ctx.font=`500 ${W*.038}px/1 ${FONT_U}`;
  ctx.fillStyle='#09090a';
  const txt='Criar meu currículo →';
  const tw=ctx.measureText(txt).width;
  ctx.fillText(txt, bx+(bw-tw)/2, by+bh*.64);
  ctx.restore(); ctx.globalAlpha=1;
}

function drawAccentLine(f, lx, ly){
  const p=ease.out3(progress(f,20,80));
  if(p<=0)return;
  const len=lerp(0,W*.38,p);
  ctx.globalAlpha=p*.45;
  const lg=ctx.createLinearGradient(lx,0,lx+len,0);
  lg.addColorStop(0,C_ACC); lg.addColorStop(1,'transparent');
  ctx.strokeStyle=lg; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx+len,ly); ctx.stroke();
  ctx.globalAlpha=1;
}

function drawFade(f){
  const p=progress(f,TOTAL-45,TOTAL);
  if(p<=0)return;
  ctx.globalAlpha=ease.in3(p);
  ctx.fillStyle=C_BG; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=1;
}

/* ═══════════════════════════════════════════
   DRAW — FORMAT LAYOUTS
═══════════════════════════════════════════ */
function drawFeed(f){
  const bgAlpha=ease.out3(progress(f,0,30));
  const LX=W*.082;

  drawBg(bgAlpha,f);
  drawParticles(bgAlpha);
  drawAccentLine(f, LX, H*.34);
  drawLogo(f, LX, H*.305);
  drawBadge(f, LX, H*.352);
  drawHeadline(f, LX, H*.49, W*.132, W*.112);
  drawSubtext(f, LX, H*.788, W*.026);
  drawDivider(f, LX, H*.808);
  drawStats(f, LX, H*.876, W*.062, W*.022);
  drawCTA(f, LX, H*.788);
  drawFade(f);
}

function drawStories(f){
  const bgAlpha=ease.out3(progress(f,0,30));
  const LX=W*.09;

  drawBg(bgAlpha,f);
  drawParticles(bgAlpha);

  // Stories: extra top glow
  const ga2=bgAlpha*.35*(.6+.4*Math.sin(f*.022+1));
  const g2=ctx.createRadialGradient(W*.88,H*.18,0,W*.88,H*.18,W*.6);
  g2.addColorStop(0,`rgba(212,184,150,${ga2})`);
  g2.addColorStop(1,'transparent');
  ctx.fillStyle=g2; ctx.fillRect(0,0,W,H);

  // Top area: logo + badge
  drawAccentLine(f, LX, H*.175);
  drawLogo(f, LX, H*.155);
  drawBadge(f, LX, H*.18);

  // Vertical spacer line left
  const vlineP=ease.out3(progress(f,30,90));
  if(vlineP>0){
    ctx.globalAlpha=vlineP*.12;
    ctx.fillStyle=C_ACC;
    ctx.fillRect(LX, H*.22, 1.5, H*.52*vlineP);
    ctx.globalAlpha=1;
  }

  // Big centered headline (stories: larger, more vertical space)
  drawHeadlineStories(f, LX+W*.06, H*.32, H*.085, W*.158);

  // Subtext
  drawSubtext(f, LX+W*.06, H*.645, W*.034);

  // Divider
  drawDivider(f, LX, H*.668);

  // Stats side by side
  drawStats(f, LX, H*.706, W*.078, W*.028);

  // CTA larger and centered
  const ctaP=ease.spring(progress(f,330,390));
  if(ctaP>0){
    const bw=W*.78, bh=W*.13, bx=(W-bw)/2, by=H*.8, br=W*.018;
    ctx.save(); ctx.globalAlpha=ctaP;
    const pulse=.5+.5*Math.sin(f*.08);
    const bg2=ctx.createRadialGradient(W/2,by+bh/2,0,W/2,by+bh/2,W*.45);
    bg2.addColorStop(0,`rgba(212,184,150,${.22*pulse})`);
    bg2.addColorStop(1,'transparent');
    ctx.fillStyle=bg2; ctx.fillRect(0,by-W*.08,W,bh+W*.16);
    roundRect(bx,by,bw,bh,br);
    ctx.fillStyle=C_ACC; ctx.fill();
    ctx.font=`500 ${W*.05}px/1 ${FONT_U}`;
    ctx.fillStyle='#09090a';
    const txt='Criar meu currículo →';
    const tw=ctx.measureText(txt).width;
    ctx.fillText(txt, bx+(bw-tw)/2, by+bh*.64);
    ctx.restore(); ctx.globalAlpha=1;
  }

  // Bottom tag
  const tagP=ease.out3(progress(f,350,400));
  if(tagP>0){
    ctx.globalAlpha=tagP*.25;
    ctx.font=`300 ${W*.022}px/1 ${FONT_U}`;
    ctx.fillStyle=C_W;
    ctx.textAlign='center';
    ctx.fillText('curriculo.ai', W/2, H*.93);
    ctx.textAlign='left';
    ctx.globalAlpha=1;
  }

  drawFade(f);
}

function drawHeadlineStories(f, lx, startY, lineH, fs){
  const lines=[
    {t:'O mercado',   s:85,  e:145, italic:false},
    {t:'não espera',  s:115, e:180, italic:true},
    {t:'por você.',   s:150, e:210, italic:false},
  ];
  lines.forEach((ln,i)=>{
    const p=ease.out5(progress(f,ln.s,ln.e));
    if(p<=0)return;
    ctx.save();
    ctx.globalAlpha=p;
    ctx.translate(0,lerp(W*.04,0,p));
    ctx.font = ln.italic
      ? `italic 300 ${fs}px/1 ${FONT_D}`
      : `300 ${fs}px/1 ${FONT_D}`;
    ctx.fillStyle = ln.italic ? C_ACC : C_W;
    ctx.fillText(ln.t, lx, startY+i*lineH);
    ctx.restore(); ctx.globalAlpha=1;
  });
}

/* ═══════════════════════════════════════════
   MAIN LOOP
═══════════════════════════════════════════ */
function draw(f){
  if(FORMAT==='feed') drawFeed(f);
  else                drawStories(f);
}

function loop(){
  draw(frame);
  frame = (frame+1) % TOTAL;
  raf = requestAnimationFrame(loop);
}

function resetAnim(){
  frame=0; initParticles();
}

loop();

/* ═══════════════════════════════════════════
   RECORDING
═══════════════════════════════════════════ */
function startRecording(){
  chunks=[];
  const stream=canvas.captureStream(FPS);
  const mimes=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4'];
  let mime='';
  for(const m of mimes){ if(MediaRecorder.isTypeSupported(m)){mime=m;break;} }
  if(!mime){ alert('Seu browser não suporta gravação. Use Chrome ou Edge.'); return; }

  recorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:18_000_000});
  recorder.ondataavailable=e=>{ if(e.data.size>0) chunks.push(e.data); };
  recorder.onstop=()=>{
    const blob=new Blob(chunks,{type:mime});
    const ext=mime.includes('mp4')?'mp4':'webm';
    const fmt=FORMAT==='stories'?'stories':'feed';
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`criativo-video-${fmt}-curriculo-ai.${ext}`;
    a.click();
    URL.revokeObjectURL(url);
    setStatus('idle');
  };
  recorder.start(100);
  setStatus('recording');
  document.getElementById('btnRec').disabled=true;
  document.getElementById('btnStop').disabled=false;
  document.getElementById('btnFeed').disabled=true;
  document.getElementById('btnStories').disabled=true;
}

function stopRecording(){
  if(recorder&&recorder.state!=='inactive') recorder.stop();
  document.getElementById('btnRec').disabled=false;
  document.getElementById('btnStop').disabled=true;
  document.getElementById('btnFeed').disabled=false;
  document.getElementById('btnStories').disabled=false;
}

function setStatus(s){
  const el=document.getElementById('status');
  el.innerHTML = s==='recording'
    ? '<span class="rec-dot"></span>Gravando — clique em Parar e Baixar quando quiser'
    : 'Animação em loop · Clique em Gravar para capturar';
}
</script>
