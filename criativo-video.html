<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CurrículoAI — Motion Creative</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--acc:#d4b896;--bg:#09090a}
body{
  background:#060607;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:32px 20px 52px;gap:22px;
  font-family:'DM Sans',sans-serif;color:#fff;
}

.brand{
  font-size:11px;font-weight:300;letter-spacing:4px;
  text-transform:uppercase;color:rgba(255,255,255,.25);
}
.brand em{font-style:italic;font-family:'Cormorant Garamond',serif;color:var(--acc)}

/* format tabs */
.tabs{display:flex;background:#0e0e10;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:4px;gap:3px}
.tab{
  padding:8px 22px;border-radius:7px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;
  letter-spacing:.7px;text-transform:uppercase;transition:all .25s;
  color:rgba(255,255,255,.28);background:transparent;
  display:flex;align-items:center;gap:7px;
}
.tab.on{background:var(--acc);color:#09090a}
.tab:not(.on):hover{color:rgba(255,255,255,.55)}
.tab:disabled{opacity:.25;pointer-events:none}

/* canvas stage */
.stage{
  position:relative;border-radius:14px;overflow:hidden;
  border:1px solid rgba(255,255,255,.09);
  box-shadow:0 0 0 1px rgba(0,0,0,.5), 0 48px 120px rgba(0,0,0,.9);
}
/* feed: show 480px wide   stories: show 270px wide (≈480px tall) */
.stage.feed    canvas{display:block;width:480px;height:480px}
.stage.stories canvas{display:block;width:270px;height:480px}

/* controls */
.ctrl{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 22px;border-radius:8px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;
  letter-spacing:.7px;text-transform:uppercase;transition:opacity .15s,transform .12s;
}
.btn:hover{opacity:.8;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.25;pointer-events:none}
.btn-red {background:#bf2e25;color:#fff}
.btn-stop{background:#1a1a1d;color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1)}
.btn-ghost{background:transparent;color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.08)}

/* status */
.status{font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.4px;display:flex;align-items:center;gap:7px}
.dot{width:6px;height:6px;border-radius:50%;background:#bf2e25;animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* meta */
.meta{font-size:10px;color:rgba(255,255,255,.15);text-align:center;line-height:1.9;letter-spacing:.2px}
.meta b{color:rgba(212,184,150,.4);font-weight:400}

.chips{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.chip{padding:3px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.06);font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.2)}
</style>
</head>
<body>

<div class="brand">Currículo<em>AI</em> &nbsp;·&nbsp; Motion Creative</div>

<div class="tabs">
  <button class="tab on" id="tFeed"    onclick="setFmt('feed')">
    <svg width="11" height="11" viewBox="0 0 11 11"><rect width="11" height="11" rx="2" fill="currentColor"/></svg>
    Feed 1:1
  </button>
  <button class="tab"    id="tStories" onclick="setFmt('stories')">
    <svg width="7"  height="11" viewBox="0 0 7 11"><rect width="7" height="11" rx="2" fill="currentColor"/></svg>
    Stories 9:16
  </button>
</div>

<div class="stage feed" id="stage">
  <canvas id="c"></canvas>
</div>

<div class="ctrl">
  <button class="btn btn-red"  id="bRec"  onclick="startRec()">
    <svg width="8" height="8"><circle cx="4" cy="4" r="4" fill="currentColor"/></svg>
    Gravar Vídeo
  </button>
  <button class="btn btn-stop" id="bStop" onclick="stopRec()" disabled>
    <svg width="8" height="8"><rect width="8" height="8" rx="1.5" fill="currentColor"/></svg>
    Parar e Baixar
  </button>
  <button class="btn btn-ghost" onclick="resetA()">
    <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M2 8a6 6 0 1 1 1.5 3.9l1.1-1.1A4.5 4.5 0 1 0 3.5 8H5L2.5 5.5 0 8h2z"/></svg>
    Reiniciar
  </button>
</div>

<div class="status" id="status">Animação em loop · Clique em Gravar para capturar</div>

<div class="chips">
  <div class="chip" id="chipFmt">Feed · 1080 × 1080</div>
  <div class="chip">60 fps</div>
  <div class="chip">WebM · ~10s</div>
  <div class="chip">Meta Ads</div>
</div>

<div class="meta">
  Grave <b>1 loop completo (~10s)</b> antes de parar.<br>
  Arquivo em <b>WebM</b> — compatível com Meta Ads, Premiere e After Effects.
</div>

<script>
/* ══════════════════════════════════════════
   SETUP
══════════════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const FD = '"Cormorant Garamond",Georgia,serif';
const FU = '"DM Sans",system-ui,sans-serif';

const BG  = '#09090a';
const ACC = '#d4b896';
const W1  = 'rgba(255,255,255,1)';
const T2  = 'rgba(255,255,255,.42)';
const T3  = 'rgba(255,255,255,.18)';

let W, H, FMT = 'feed';
let frame = 0, raf, recorder, chunks = [];
const FPS   = 60;
const TOTAL = 600; // 10s loop

/* ══════════════════════════════════════════
   FORMAT
══════════════════════════════════════════ */
function setFmt(f){
  if(FMT===f) return;
  if(recorder && recorder.state!=='inactive') return;
  FMT = f;
  applyFmt();
  resetA();
}
function applyFmt(){
  if(FMT==='feed'){ canvas.width=1080; canvas.height=1080; }
  else            { canvas.width=1080; canvas.height=1920; }
  W = canvas.width; H = canvas.height;
  document.getElementById('stage').className = `stage ${FMT}`;
  document.getElementById('tFeed').className    = `tab${FMT==='feed'?' on':''}`;
  document.getElementById('tStories').className = `tab${FMT==='stories'?' on':''}`;
  document.getElementById('chipFmt').textContent =
    FMT==='feed' ? 'Feed · 1080 × 1080' : 'Stories · 1080 × 1920';
  initParticles(); initNoise();
}
applyFmt();

/* ══════════════════════════════════════════
   EASING
══════════════════════════════════════════ */
const E = {
  o3:  t=>1-Math.pow(1-t,3),
  o5:  t=>1-Math.pow(1-t,5),
  i3:  t=>t*t*t,
  io:  t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2,
  spr: t=>{
    if(!t) return 0; if(t===1) return 1;
    return Math.pow(2,-10*t)*Math.sin((t*10-.75)*(2*Math.PI/3))+1;
  },
  back:t=>{ const c=1.70158; return (c+1)*t*t*t - c*t*t; }
};
const cl   = (v,a,b) => Math.max(a,Math.min(b,v));
const pg   = (f,s,e) => cl((f-s)/(e-s),0,1);
const lerp = (a,b,t) => a+(b-a)*t;

/* ══════════════════════════════════════════
   NOISE
══════════════════════════════════════════ */
const NOISE_FRAMES = 4;
const noiseC = [];
function initNoise(){
  noiseC.length = 0;
  const ns = Math.min(W, 512);
  for(let n=0;n<NOISE_FRAMES;n++){
    const oc = document.createElement('canvas');
    oc.width = oc.height = ns;
    const ox = oc.getContext('2d');
    const id = ox.createImageData(ns,ns);
    for(let i=0;i<id.data.length;i+=4){
      const v = Math.random()*255|0;
      id.data[i]=id.data[i+1]=id.data[i+2]=v;
      id.data[i+3]=255;
    }
    ox.putImageData(id,0,0);
    noiseC.push(oc);
  }
}

/* ══════════════════════════════════════════
   PARTICLES
══════════════════════════════════════════ */
let parts = [];
function initParticles(){
  parts = Array.from({length:55},()=>({
    x:Math.random()*W, y:Math.random()*H,
    r:Math.random()*1.5+.3,
    vx:(Math.random()-.5)*.35, vy:(Math.random()-.5)*.35,
    o:Math.random()*.18+.03,
    ph:Math.random()*Math.PI*2,
    sp:Math.random()*.03+.006,
  }));
}

/* ══════════════════════════════════════════
   DRAW UTILITIES
══════════════════════════════════════════ */
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

/* ══════════════════════════════════════════
   LAYER — BACKGROUND + ORBS
══════════════════════════════════════════ */
function drawBG(f){
  ctx.globalAlpha=1;
  ctx.fillStyle=BG;
  ctx.fillRect(0,0,W,H);

  // 3 animated orbs
  const orbs=[
    {cx:.12, cy:.45, r:.68, speed:.007, phase:0,     col:'212,184,150', base:.48},
    {cx:.85, cy:.15, r:.55, speed:.011, phase:1.8,   col:'100,80,160',  base:.22},
    {cx:.5,  cy:.88, r:.52, speed:.009, phase:3.4,   col:'80,100,180',  base:.18},
  ];
  orbs.forEach(o=>{
    const ox = (o.cx + Math.sin(f*o.speed+o.phase)*.06)*W;
    const oy = (o.cy + Math.cos(f*o.speed*1.3+o.phase)*.05)*H;
    const a  = o.base*(0.7+0.3*Math.sin(f*o.speed*2+o.phase));
    const g  = ctx.createRadialGradient(ox,oy,0,ox,oy,o.r*W);
    g.addColorStop(0,`rgba(${o.col},${a})`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  });

  // vignette
  const vig=ctx.createRadialGradient(W/2,H/2,W*.2,W/2,H/2,W*.85);
  vig.addColorStop(0,'transparent');
  vig.addColorStop(1,'rgba(0,0,0,.55)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  // grain
  const ni = noiseC[Math.floor(f/2)%NOISE_FRAMES];
  ctx.globalAlpha=.025;
  ctx.globalCompositeOperation='screen';
  ctx.drawImage(ni,0,0,W,H);
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════
   LAYER — PARTICLES
══════════════════════════════════════════ */
function drawParts(f){
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    p.ph+=p.sp;
    ctx.globalAlpha=p.o*(.4+.6*Math.sin(p.ph));
    ctx.fillStyle=ACC;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════
   LAYER — GEOMETRIC ACCENTS
══════════════════════════════════════════ */
function drawGeo(f, lx, topY){
  // horizontal scan line
  const scanP = pg(f,10,60);
  if(scanP>0){
    const scanY = lerp(-W*.02, topY-W*.04, E.o5(scanP));
    ctx.globalAlpha=scanP*.35;
    const sg=ctx.createLinearGradient(lx,0,lx+W*.7,0);
    sg.addColorStop(0,ACC); sg.addColorStop(.6,'rgba(212,184,150,.3)'); sg.addColorStop(1,'transparent');
    ctx.strokeStyle=sg; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(lx,scanY); ctx.lineTo(lx+W*.7,scanY); ctx.stroke();
    ctx.globalAlpha=1;
  }

  // two accent lines drawing in from left
  [[W*.015, topY+W*.006],[W*.015, topY+W*.017]].forEach(([lx2,ly],i)=>{
    const p=E.o5(pg(f,25+i*15,90+i*15));
    if(!p) return;
    const len=lerp(0,W*.38,p);
    const lg=ctx.createLinearGradient(lx2,0,lx2+len,0);
    lg.addColorStop(0,ACC); lg.addColorStop(1,'transparent');
    ctx.globalAlpha=p*(i===0?.5:.25);
    ctx.strokeStyle=lg; ctx.lineWidth=i===0?1.5:.8;
    ctx.beginPath(); ctx.moveTo(lx2,ly); ctx.lineTo(lx2+len,ly); ctx.stroke();
    ctx.globalAlpha=1;
  });

  // rotating diamond (top-right accent)
  const dP=E.o3(pg(f,40,100));
  if(dP>0){
    const dx=W*.9, dy=topY-W*.04, ds=W*.028;
    const rot=(f*.012)%(Math.PI*2);
    ctx.save();
    ctx.translate(dx,dy); ctx.rotate(rot);
    ctx.globalAlpha=dP*.25;
    ctx.strokeStyle=ACC; ctx.lineWidth=1.2;
    ctx.beginPath();
    ctx.moveTo(0,-ds); ctx.lineTo(ds,0);
    ctx.lineTo(0,ds); ctx.lineTo(-ds,0);
    ctx.closePath(); ctx.stroke();
    ctx.restore(); ctx.globalAlpha=1;
  }

  // corner brackets (feed only)
  if(FMT==='feed'){
    const bP=E.o3(pg(f,50,110));
    if(bP>0){
      const sz=W*.045, pad=W*.028, lw=1.5;
      ctx.globalAlpha=bP*.2; ctx.strokeStyle=ACC; ctx.lineWidth=lw;
      [[pad,pad],[W-pad,pad],[W-pad,H-pad],[pad,H-pad]].forEach(([cx,cy],i)=>{
        const sx=cx===pad?1:-1, sy=cy===pad?1:-1;
        ctx.beginPath();
        ctx.moveTo(cx+sz*sx,cy); ctx.lineTo(cx,cy); ctx.lineTo(cx,cy+sz*sy);
        ctx.stroke();
      });
      ctx.globalAlpha=1;
    }
  }
}

/* ══════════════════════════════════════════
   LAYER — LOGO (char-by-char)
══════════════════════════════════════════ */
function drawLogo(f, lx, ly){
  const p=E.o5(pg(f,45,105));
  if(!p) return;
  const fs = W*.022;
  ctx.save();
  ctx.globalAlpha=cl(p*2,0,1);

  // "Currículo" char by char
  const word='Currículo';
  ctx.font=`300 ${fs}px/1 ${FU}`;
  let cx=lx;
  word.split('').forEach((ch,i)=>{
    const cp=cl((p*word.length - i)/1.5, 0, 1);
    const oy=lerp(-W*.025, 0, E.spr(cp));
    ctx.globalAlpha=cl(cp*3,0,1)*.6;
    ctx.fillStyle=T2;
    ctx.save(); ctx.translate(0,oy);
    ctx.fillText(ch,cx,ly); ctx.restore();
    cx+=ctx.measureText(ch).width;
  });

  // "AI" italic
  ctx.font=`italic 300 ${fs}px/1 ${FD}`;
  const aiP=cl((p*1.5-.5)*2,0,1);
  ctx.globalAlpha=aiP;
  ctx.fillStyle=ACC;
  const aiOy=lerp(-W*.025,0,E.spr(cl(aiP,0,1)));
  ctx.save(); ctx.translate(0,aiOy); ctx.fillText('AI',cx+W*.003,ly); ctx.restore();

  ctx.restore(); ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════
   LAYER — BADGE
══════════════════════════════════════════ */
function drawBadge(f, lx, ly){
  const p=E.spr(pg(f,70,125));
  if(!p) return;
  ctx.save();
  ctx.globalAlpha=cl(p*1.5,0,1);
  ctx.translate(0,lerp(-W*.02,0,p));
  const bw=W*.25,bh=W*.038,br=bh/2;
  rr(lx,ly,bw,bh,br);
  ctx.fillStyle='rgba(212,184,150,.07)'; ctx.fill();
  rr(lx,ly,bw,bh,br);
  ctx.strokeStyle='rgba(212,184,150,.22)'; ctx.lineWidth=1; ctx.stroke();
  ctx.fillStyle=ACC;
  ctx.beginPath(); ctx.arc(lx+bw*.11,ly+bh/2,W*.005,0,Math.PI*2); ctx.fill();
  ctx.font=`400 ${W*.015}px/1 ${FU}`;
  ctx.fillStyle=T2;
  ctx.letterSpacing=`${W*.0035}px`;
  ctx.fillText('POWERED BY IA',lx+bw*.2,ly+bh*.67);
  ctx.letterSpacing='0px';
  ctx.restore(); ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════
   LAYER — HEADLINE (clip wipe)
══════════════════════════════════════════ */
function drawHeadline(f, lx, startY, lineH, fs){
  const lines=[
    {t:'O mercado',  s:100, e:160, italic:false},
    {t:'não espera', s:130, e:195, italic:true},
    {t:'por você.',  s:165, e:230, italic:false},
  ];
  lines.forEach((ln,i)=>{
    const p=E.o5(pg(f,ln.s,ln.e));
    if(!p) return;
    const y=startY+i*lineH;
    const oy=lerp(lineH*.6,0,p);

    // clip mask: reveal from bottom
    ctx.save();
    ctx.beginPath();
    ctx.rect(lx-W*.02, y-lineH*1.1, W*.9, lineH*1.25);
    ctx.clip();
    ctx.globalAlpha=p;
    ctx.translate(0,oy);
    ctx.font=ln.italic
      ? `italic 300 ${fs}px/1 ${FD}`
      : `300 ${fs}px/1 ${FD}`;
    ctx.fillStyle=ln.italic?ACC:W1;
    ctx.fillText(ln.t,lx,y);
    ctx.restore();
    ctx.globalAlpha=1;
  });
}

/* ══════════════════════════════════════════
   LAYER — SUBTEXT
══════════════════════════════════════════ */
function drawSub(f, lx, y, fs){
  const p=E.o3(pg(f,220,280));
  if(!p) return;
  ctx.save();
  ctx.globalAlpha=p*.55;
  ctx.translate(0,lerp(W*.018,0,p));
  ctx.font=`300 ${fs}px/1 ${FU}`;
  ctx.fillStyle=T2;
  ctx.fillText('Currículo profissional com IA em menos de 3 minutos.',lx,y);
  ctx.restore(); ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════
   LAYER — DIVIDER
══════════════════════════════════════════ */
function drawDiv(f, lx, y){
  const p=E.o5(pg(f,228,295));
  if(!p) return;
  const lg=ctx.createLinearGradient(lx,0,lx+W*.84,0);
  lg.addColorStop(0,`rgba(212,184,150,.25)`);
  lg.addColorStop(1,'transparent');
  ctx.globalAlpha=p;
  ctx.fillStyle=lg;
  ctx.fillRect(lx,y,W*.84*p,1);
  ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════
   LAYER — STATS COUNTER
══════════════════════════════════════════ */
function drawStats(f, lx, y, vFs, lFs){
  const s=[
    {target:12000, suffix:'k', prefix:'+', label:'currículos gerados', s:265, e:350, xs:lx},
    {target:3,     suffix:' min', prefix:'', label:'tempo médio',       s:285, e:370, xs:lx+W*.32},
  ];
  s.forEach(st=>{
    const p=E.spr(pg(f,st.s,st.e));
    if(!p) return;
    ctx.save();
    ctx.globalAlpha=cl(p*2,0,1);
    ctx.translate(0,lerp(W*.025,0,p));

    // number counter
    const raw = st.target===12000
      ? Math.round(lerp(0,12,cl(p*1.2,0,1)))
      : Math.round(lerp(0,3,cl(p*1.2,0,1)));
    const disp = st.target===12000
      ? `${st.prefix}${raw}${st.suffix}`
      : `${st.prefix}${raw}${st.suffix}`;

    ctx.font=`300 ${vFs}px/1 ${FD}`;
    ctx.fillStyle=ACC;
    ctx.fillText(disp, st.xs, y);
    ctx.font=`300 ${lFs}px/1 ${FU}`;
    ctx.fillStyle=T3;
    ctx.fillText(st.label, st.xs, y+lFs*1.6);
    ctx.restore(); ctx.globalAlpha=1;
  });
}

/* ══════════════════════════════════════════
   LAYER — CTA (shimmer)
══════════════════════════════════════════ */
function drawCTA(f, lx, by, bw){
  const p=E.spr(pg(f,340,405));
  if(!p) return;
  const bh=W*.072, br=W*.014;
  ctx.save(); ctx.globalAlpha=p;

  // glow
  const pulse=.5+.5*Math.sin(f*.07);
  const g1=ctx.createRadialGradient(lx+bw/2,by+bh/2,0,lx+bw/2,by+bh/2,bw*.55);
  g1.addColorStop(0,`rgba(212,184,150,${.22*pulse})`);
  g1.addColorStop(1,'transparent');
  ctx.fillStyle=g1; ctx.fillRect(lx-bw*.1,by-bh*.6,bw*1.2,bh*2.2);

  // button
  rr(lx,by,bw,bh,br);
  ctx.fillStyle=ACC; ctx.fill();

  // shimmer sweep
  const shimP=(f*.018)%2;
  if(shimP<1){
    const sx=lerp(lx-bw*.3,lx+bw*1.3,shimP);
    ctx.save();
    rr(lx,by,bw,bh,br); ctx.clip();
    const sg=ctx.createLinearGradient(sx-bw*.18,0,sx+bw*.18,0);
    sg.addColorStop(0,'transparent');
    sg.addColorStop(.5,'rgba(255,255,255,.18)');
    sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg; ctx.fillRect(sx-bw*.2,by,bw*.4,bh);
    ctx.restore();
  }

  // label
  ctx.font=`500 ${W*.038}px/1 ${FU}`;
  ctx.fillStyle='#09090a';
  const txt='Criar meu currículo →';
  const tw=ctx.measureText(txt).width;
  ctx.fillText(txt, lx+(bw-tw)/2, by+bh*.65);
  ctx.restore(); ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════
   LAYER — FADE
══════════════════════════════════════════ */
function drawFade(f){
  const p=pg(f,TOTAL-50,TOTAL);
  if(!p) return;
  ctx.globalAlpha=E.i3(p);
  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════
   MAIN DRAW — FEED
══════════════════════════════════════════ */
function drawFeed(f){
  const lx=W*.082;
  drawBG(f);
  drawParts(f);
  drawGeo(f, lx, H*.295);
  drawLogo(f,  lx, H*.295);
  drawBadge(f, lx, H*.315);
  drawHeadline(f, lx, H*.485, W*.135, W*.114);
  drawSub(f,   lx, H*.788, W*.027);
  drawDiv(f,   lx, H*.806);
  drawStats(f, lx, H*.876, W*.065, W*.023);
  drawCTA(f,   lx, H*.788, W*.33);
  drawFade(f);
}

/* ══════════════════════════════════════════
   MAIN DRAW — STORIES
══════════════════════════════════════════ */
function drawStories(f){
  const lx=W*.088;
  drawBG(f);
  drawParts(f);

  // extra top-right ambient
  const ga=.28*(.7+.3*Math.sin(f*.014+2));
  const gr2=ctx.createRadialGradient(W*.92,H*.12,0,W*.92,H*.12,W*.65);
  gr2.addColorStop(0,`rgba(212,184,150,${ga})`);
  gr2.addColorStop(1,'transparent');
  ctx.fillStyle=gr2; ctx.fillRect(0,0,W,H);

  // corner brackets top
  const bkP=E.o3(pg(f,50,110));
  if(bkP>0){
    const sz=W*.06,pad=W*.05;
    ctx.globalAlpha=bkP*.18; ctx.strokeStyle=ACC; ctx.lineWidth=2;
    [[pad,H*.06],[W-pad,H*.06],[W-pad,H*.94],[pad,H*.94]].forEach(([cx,cy],i)=>{
      const sx=cx<W/2?1:-1, sy=cy<H/2?1:-1;
      ctx.beginPath();
      ctx.moveTo(cx+sz*sx,cy); ctx.lineTo(cx,cy); ctx.lineTo(cx,cy+sz*sy);
      ctx.stroke();
    });
    ctx.globalAlpha=1;
  }

  // top: logo + badge + geo
  drawGeo(f, lx, H*.135);
  drawLogo(f,  lx, H*.132);
  drawBadge(f, lx, H*.148);

  // left accent bar
  const barP=E.o3(pg(f,30,90));
  if(barP>0){
    const bary=H*.18, barH=H*.52*barP;
    const lg=ctx.createLinearGradient(0,bary,0,bary+barH);
    lg.addColorStop(0,`rgba(212,184,150,.18)`);
    lg.addColorStop(1,'transparent');
    ctx.globalAlpha=barP; ctx.fillStyle=lg;
    ctx.fillRect(lx,bary,2,barH);
    ctx.globalAlpha=1;
  }

  // headline larger, indented
  drawHeadline(f, lx+W*.07, H*.28, H*.082, W*.158);

  // subtext
  drawSub(f,   lx+W*.07, H*.63, W*.034);
  drawDiv(f,   lx,       H*.655);
  drawStats(f, lx,       H*.698, W*.08, W*.028);

  // big centered CTA
  const ctaP=E.spr(pg(f,340,405));
  if(ctaP>0){
    const bw=W*.79, bh=W*.13, bx=(W-bw)/2, by=H*.8, br=W*.02;
    ctx.save(); ctx.globalAlpha=ctaP;
    const pulse=.5+.5*Math.sin(f*.07);
    const g1=ctx.createRadialGradient(W/2,by+bh/2,0,W/2,by+bh/2,W*.5);
    g1.addColorStop(0,`rgba(212,184,150,${.25*pulse})`);
    g1.addColorStop(1,'transparent');
    ctx.fillStyle=g1; ctx.fillRect(0,by-bh*.5,W,bh*2);
    rr(bx,by,bw,bh,br);
    ctx.fillStyle=ACC; ctx.fill();
    // shimmer
    const sp=(f*.018)%2;
    if(sp<1){
      const sx=lerp(bx-bw*.3,bx+bw*1.3,sp);
      ctx.save(); rr(bx,by,bw,bh,br); ctx.clip();
      const sg=ctx.createLinearGradient(sx-bw*.18,0,sx+bw*.18,0);
      sg.addColorStop(0,'transparent');
      sg.addColorStop(.5,'rgba(255,255,255,.18)');
      sg.addColorStop(1,'transparent');
      ctx.fillStyle=sg; ctx.fillRect(sx-bw*.2,by,bw*.4,bh);
      ctx.restore();
    }
    ctx.font=`500 ${W*.05}px/1 ${FU}`;
    ctx.fillStyle='#09090a';
    const txt='Criar meu currículo →';
    const tw2=ctx.measureText(txt).width;
    ctx.fillText(txt,bx+(bw-tw2)/2,by+bh*.66);
    ctx.restore(); ctx.globalAlpha=1;
  }

  // bottom url tag
  const tagP=E.o3(pg(f,370,430));
  if(tagP>0){
    ctx.globalAlpha=tagP*.22;
    ctx.font=`300 ${W*.024}px/1 ${FU}`;
    ctx.fillStyle=W1;
    ctx.textAlign='center';
    ctx.fillText('curriculo.ai',W/2,H*.935);
    ctx.textAlign='left';
    ctx.globalAlpha=1;
  }

  drawFade(f);
}

/* ══════════════════════════════════════════
   LOOP
══════════════════════════════════════════ */
function draw(f){
  FMT==='feed' ? drawFeed(f) : drawStories(f);
}
function loop(){
  draw(frame);
  frame=(frame+1)%TOTAL;
  raf=requestAnimationFrame(loop);
}
function resetA(){ frame=0; initParticles(); }

// wait for fonts then start
document.fonts.ready.then(()=>{ loop(); });

/* ══════════════════════════════════════════
   RECORDING
══════════════════════════════════════════ */
function startRec(){
  chunks=[];
  const stream=canvas.captureStream(FPS);
  const mimes=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4'];
  let mime='';
  for(const m of mimes) if(MediaRecorder.isTypeSupported(m)){mime=m;break;}
  if(!mime){alert('Use Chrome ou Edge para gravar.');return;}

  recorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:20_000_000});
  recorder.ondataavailable=e=>e.data.size&&chunks.push(e.data);
  recorder.onstop=()=>{
    const blob=new Blob(chunks,{type:mime});
    const ext=mime.includes('mp4')?'mp4':'webm';
    const a=Object.assign(document.createElement('a'),{
      href:URL.createObjectURL(blob),
      download:`criativo-${FMT}-curriculo-ai.${ext}`
    });
    a.click(); URL.revokeObjectURL(a.href);
    setStatus('idle');
  };
  recorder.start(100);
  setStatus('rec');
  ['bRec'].forEach(id=>document.getElementById(id).disabled=true);
  ['bStop'].forEach(id=>document.getElementById(id).disabled=false);
  ['tFeed','tStories'].forEach(id=>document.getElementById(id).disabled=true);
}

function stopRec(){
  recorder?.state!=='inactive'&&recorder.stop();
  document.getElementById('bRec').disabled=false;
  document.getElementById('bStop').disabled=true;
  ['tFeed','tStories'].forEach(id=>document.getElementById(id).disabled=false);
}

function setStatus(s){
  document.getElementById('status').innerHTML=s==='rec'
    ?'<span class="dot"></span>Gravando — pare quando quiser para baixar'
    :'Animação em loop · Clique em Gravar para capturar';
}
</script>
